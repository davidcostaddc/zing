<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ZING</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;900&display=swap" rel="stylesheet">
</head>

<body>
	<div class="login">
		<p class="subtitulo">Plataforma Gamificada de Aprendizado</p>
		<h1 class="logo-zing gigante">ZING</h1>
		<div class="perfil">
			<img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" class="avatar" alt="Avatar Educativo">
			<input id="nome" placeholder="Digite seu nome">
			<button onclick="entrar()">Entrar</button>
		</div>
	</div>
	<div id="dashboard" class="hidden">
		<div class="topo">
			<img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" class="avatar" alt="Avatar Educativo">
				<div class="user-info">
					   <h2 id="usuario"></h2>
					   <div class="pontos" style="margin:0;"><span id="pontos">0</span> pts</div>
					   <div id="nivelDashboard" style="margin-top:8px;"></div>
			</div>
		</div>
		<h2 class="titulo-assuntos">Escolha um assunto</h2>
		<div class="cards">
			<div class="card card-educativo">
				<div class="card-icone">🔐</div>
				<h3>Segurança Digital</h3>
				<p>Proteção e autenticação</p>
				<div class="card-btns">
					<button onclick="abrirQuiz('seguranca')">Iniciar Atividade</button>
					<button onclick="abrirRanking('seguranca')">Ranking</button>
				</div>
			</div>
			<div class="card card-educativo">
				<div class="card-icone">🌐</div>
				<h3>Redes</h3>
				<p>Conceitos de rede</p>
				<div class="card-btns">
					<button onclick="abrirQuiz('redes')">Iniciar Atividade</button>
					<button onclick="abrirRanking('redes')">Ranking</button>
				</div>
			</div>
			<div class="card card-educativo">
				<div class="card-icone">💻</div>
				<h3>Programação</h3>
				<p>Lógica e código</p>
				<div class="card-btns">
					<button onclick="abrirQuiz('programacao')">Iniciar Atividade</button>
					<button onclick="abrirRanking('programacao')">Ranking</button>
				</div>
			</div>
		</div>
		<hr style="border:0;border-top:2px dashed #b6c6e6;margin:36px auto 24px auto;max-width:420px;background:none;">
		<div class="cards">
			<!-- Cards bloqueados para aulas futuras -->
			<div class="card card-bloqueado">
				<div class="card-icone">🔒</div>
				<h3>Banco de Dados</h3>
				<p>Em breve</p>
				<div class="card-btns">
					<button disabled style="opacity:0.6;cursor:not-allowed;">Bloqueado</button>
				</div>
			</div>
			<div class="card card-bloqueado">
				<div class="card-icone">🔒</div>
				<h3>Robótica</h3>
				<p>Em breve</p>
				<div class="card-btns">
					<button disabled style="opacity:0.6;cursor:not-allowed;">Bloqueado</button>
				</div>
			</div>
			<div class="card card-bloqueado">
				<div class="card-icone">🔒</div>
				<h3>Inteligência Artificial</h3>
				<p>Em breve</p>
				<div class="card-btns">
					<button disabled style="opacity:0.6;cursor:not-allowed;">Bloqueado</button>
				</div>
			</div>
		</div>
	</div>
	<script src="script.js"></script>
</body>
</html>
